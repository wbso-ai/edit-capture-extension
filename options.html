<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Slop Off — Settings</title>
  <style>
    :root {
      --wbso-blue: #195FA4;
      --wbso-blue-dark: #0F4D8A;
      --wbso-navy: #001E35;
      --wbso-bg: #EEF2F7;
    }
    body {
      font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--wbso-bg);
      margin: 0;
      color: var(--wbso-navy);
      min-height: 100vh;
    }
    .card {
      max-width: 680px;
      margin: 48px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 30, 53, 0.08);
      overflow: hidden;
    }
    header {
      background: linear-gradient(135deg, var(--wbso-blue), var(--wbso-blue-dark));
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header img { width: 40px; height: 40px; }
    header h1 { font-size: 20px; margin: 0; font-weight: 700; }
    header p { margin: 2px 0 0; font-size: 13px; opacity: 0.85; }
    .gold-bar { height: 4px; background: #FBB734; }
    main { padding: 24px 32px 32px; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <img src="icons/icon128.png" alt="">
      <div>
        <h1>Slop Off</h1>
        <p>Settings</p>
      </div>
    </header>
    <div class="gold-bar"></div>
    <main>
      <!-- Same panel as the in-page ⚙ overlay, rendered by panes.js -->
      <div id="tabbar"></div>
      <div id="panes" style="margin-top: 18px;"></div>
    </main>
  </div>
  <script src="panes.js"></script>
  <script src="options.js"></script>
</body>
</html>
